<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLTH</title>
<script>
  (function(){
    try{
      var pref = JSON.parse(localStorage.getItem('flth_theme') || '"system"');
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
</head>
<body data-i18n-doctitle="contact.title">

<a href="#main" class="skip-link">Skip to content</a>
<div id="app-header"></div>

<main id="main">
  <div class="page-hero anim-fade-up">
    <div class="container">
      <span class="eyebrow" data-i18n="contact.eyebrow"></span>
      <h1 data-i18n="contact.title"></h1>
      <p data-i18n="contact.subtitle"></p>
    </div>
  </div>

  <section>
    <div class="container grid-2" style="max-width:920px;align-items:flex-start;">
      <div class="card anim-fade-up">
        <form id="contactForm" novalidate>
          <div class="field">
            <label for="c_name" data-i18n="contact.name"></label>
            <input class="input" type="text" id="c_name" required>
            <div class="field-error" id="err_c_name"></div>
          </div>
          <div class="field">
            <label for="c_email" data-i18n="contact.email"></label>
            <input class="input" type="email" id="c_email" dir="ltr" required>
            <div class="field-error" id="err_c_email"></div>
          </div>
          <div class="field">
            <label for="c_subject" data-i18n="contact.subject"></label>
            <input class="input" type="text" id="c_subject" required>
            <div class="field-error" id="err_c_subject"></div>
          </div>
          <div class="field">
            <label for="c_message" data-i18n="contact.message"></label>
            <textarea class="textarea" id="c_message" data-i18n-placeholder="contact.messagePlaceholder" required></textarea>
            <div class="field-error" id="err_c_message"></div>
          </div>
          <button type="submit" class="btn btn--primary btn--block" data-i18n="contact.send"></button>
          <p class="text-mute" style="font-size:.78rem;margin-top:12px;" data-i18n="contact.note"></p>
        </form>
      </div>

      <div class="card anim-fade-up">
        <h3 data-i18n="contact.otherWaysTitle"></h3>
        <div class="flex items-center gap-12" style="margin-bottom:16px;">
          <span class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h18v12H3V6Z" stroke="currentColor" stroke-width="1.6"/><path d="m3 7 9 6 9-6" stroke="currentColor" stroke-width="1.6"/></svg></span>
          <div><div class="text-mute" style="font-size:.78rem;" data-i18n="contact.emailLabel"></div><div style="font-weight:700;" dir="ltr">haythemmohamed478@gmail.com</div></div>
        </div>
        <div class="flex items-center gap-12">
          <span class="stat-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11Z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="10" r="2.4" stroke="currentColor" stroke-width="1.6"/></svg></span>
          <div><div class="text-mute" style="font-size:.78rem;" data-i18n="contact.locationLabel"></div><div style="font-weight:700;" data-i18n="contact.locationValue"></div></div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script type="module">
  import { initShell } from './assets/js/app-shell.js';
  import { t } from './assets/js/modules/i18n.js';
  import { validateForm, rules } from './assets/js/utils/validators.js';
  import { qs } from './assets/js/utils/dom.js';

  function wireContactForm() {
    const form = qs('#contactForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = {
        c_name: qs('#c_name').value.trim(),
        c_email: qs('#c_email').value.trim(),
        c_subject: qs('#c_subject').value.trim(),
        c_message: qs('#c_message').value.trim(),
      };
      const errors = validateForm(data, {
        c_name: [rules.required],
        c_email: [rules.required, rules.email],
        c_subject: [rules.required],
        c_message: [rules.required],
      });
      ['c_name','c_email','c_subject','c_message'].forEach((f) => { const el = qs('#err_' + f); if (el) el.textContent = errors[f] ? t(errors[f]) : ''; });
      if (Object.keys(errors).length) return;

      const body = encodeURIComponent(`${data.c_message}\n\n— ${data.c_name} (${data.c_email})`);
      window.location.href = `mailto:haythemmohamed478@gmail.com?subject=${encodeURIComponent(data.c_subject)}&body=${body}`;
    });
  }

  initShell().then(wireContactForm);
</script>
</body>
</html>
