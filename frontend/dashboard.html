<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLTH</title>
<script>
  (function(){
    try{
      var pref = JSON.parse(localStorage.getItem('flth_theme') || '"system"');
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
</head>
<body data-i18n-doctitle="dashboard.title">

<a href="#main" class="skip-link">Skip to content</a>
<div id="app-header"></div>

<main id="main">
  <div class="container dash-shell">
    <aside class="dash-sidebar" id="dash-sidebar" aria-label="Dashboard navigation"></aside>

    <section class="dash-main">
      <div class="dash-page-head anim-fade-up">
        <div>
          <h1 id="welcomeTitle" style="margin-bottom:2px;"></h1>
          <p data-i18n="dashboard.subtitle"></p>
        </div>
        <div id="verifyBadgeWrap"></div>
      </div>

      <div class="grid-2" style="grid-template-columns: 1.3fr 1fr; align-items:stretch;" id="topRow">
        <div class="card anim-fade-up">
          <div class="card-head">
            <h3 data-i18n="dashboard.completeness"></h3>
          </div>
          <div class="flex items-center gap-24 flex-wrap">
            <div class="progress-ring-wrap" id="ringWrap">
              <svg width="96" height="96" viewBox="0 0 96 96">
                <circle cx="48" cy="48" r="42" fill="none" stroke="var(--divider)" stroke-width="9"/>
                <circle id="ringProgress" cx="48" cy="48" r="42" fill="none" stroke="var(--accent)" stroke-width="9" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264" style="transition: stroke-dashoffset .8s var(--ease-out);"/>
              </svg>
              <div class="progress-ring-value" id="ringValue">0%</div>
            </div>
            <p class="text-mute" style="max-width:280px;margin:0;" data-i18n="dashboard.completenessHint"></p>
          </div>
        </div>

        <div class="card anim-fade-up">
          <div class="card-head"><h3 data-i18n="dashboard.quickActions"></h3></div>
          <div class="flex flex-wrap gap-8" id="quickActions"></div>
        </div>
      </div>

      <div class="grid-3" id="statGrid" style="grid-template-columns:repeat(5,1fr);"></div>

      <div class="card anim-fade-up">
        <div class="card-head"><h3 data-i18n="dashboard.recentSectionsTitle"></h3></div>
        <div class="table-wrap">
          <table>
            <tbody id="sectionsBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="app-footer"></div>

<script type="module">
  import { initShell } from './assets/js/app-shell.js';
  import { runDashboardPage } from './assets/js/pages/dashboard.js';
  initShell().then(runDashboardPage);
</script>
</body>
</html>
