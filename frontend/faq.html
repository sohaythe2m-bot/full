<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLTH</title>
<script>
  (function(){
    try{
      var pref = JSON.parse(localStorage.getItem('flth_theme') || '"system"');
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
</head>
<body data-i18n-doctitle="faq.title">

<a href="#main" class="skip-link">Skip to content</a>
<div id="app-header"></div>

<main id="main">
  <div class="page-hero anim-fade-up">
    <div class="container">
      <span class="eyebrow" data-i18n="faq.eyebrow"></span>
      <h1 data-i18n="faq.title"></h1>
      <p data-i18n="faq.subtitle"></p>
    </div>
  </div>

  <section>
    <div class="container" style="max-width:760px;">
      <div id="accordion"></div>
    </div>
  </section>
</main>

<div id="app-footer"></div>

<script type="module">
  import { initShell } from './assets/js/app-shell.js';
  import { t, onLangChange } from './assets/js/modules/i18n.js';
  import { qs, qsa } from './assets/js/utils/dom.js';

  function renderFaq() {
    const items = [1,2,3,4,5,6].map(n => ({ q: t(`faq.q${n}`), a: t(`faq.a${n}`) }));
    qs('#accordion').innerHTML = items.map((item, i) => `
      <div class="accordion-item" data-index="${i}">
        <button type="button" class="accordion-trigger" aria-expanded="false" id="faqTrigger${i}" aria-controls="faqPanel${i}">
          <span>${item.q}</span>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="accordion-panel" id="faqPanel${i}" role="region" aria-labelledby="faqTrigger${i}">
          <div class="accordion-panel-inner">${item.a}</div>
        </div>
      </div>
    `).join('');

    qsa('.accordion-item').forEach((item) => {
      const trigger = item.querySelector('.accordion-trigger');
      const panel = item.querySelector('.accordion-panel');
      trigger.addEventListener('click', () => {
        const isOpen = item.classList.contains('open');
        qsa('.accordion-item').forEach((other) => {
          other.classList.remove('open');
          other.querySelector('.accordion-trigger').setAttribute('aria-expanded', 'false');
          other.querySelector('.accordion-panel').style.maxHeight = null;
        });
        if (!isOpen) {
          item.classList.add('open');
          trigger.setAttribute('aria-expanded', 'true');
          panel.style.maxHeight = panel.scrollHeight + 'px';
        }
      });
    });
  }

  initShell().then(() => { renderFaq(); onLangChange(renderFaq); });
</script>
</body>
</html>
