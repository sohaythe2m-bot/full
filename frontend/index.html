<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="FLTH — From Learning To Hiring. Build one real candidate profile and get discovered.">
<title>FLTH</title>
<style>
.hero-visual.anim-scale-in {
    position: relative;
    transform: scale(1.05);
    transition: all .5s ease;

    background: url("logo.png") center/cover no-repeat;

    border-radius: 28px;
    overflow: hidden;

    border: 1px solid rgba(255,255,255,.15);

    box-shadow:
        0 30px 80px rgba(0,0,0,.20),
        inset 0 1px 1px rgba(255,255,255,.25);
}

.hero-visual.anim-scale-in::after {
    content: "";
    position: absolute;
    inset: 0;

    background: linear-gradient(
        135deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,0) 45%,
        rgba(0,0,0,.08)
    );

    pointer-events: none;
}
</style>
<script>
  (function(){
    try{
      var pref = JSON.parse(localStorage.getItem('flth_theme') || '"system"');
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/pages/landing.css">
</head>
<body data-i18n-doctitle="meta.docTitleSuffix">

<a href="#main" class="skip-link">Skip to content</a>
<div id="app-header"></div>

<main id="main">

  <section class="hero">
    <div class="container hero-grid">
      <div class="anim-fade-up">
        <span class="eyebrow" data-i18n="landing.heroEyebrow"></span>
        <h1 data-i18n="landing.heroTitle"></h1>
        <p class="lede" data-i18n="landing.heroLede"></p>
        <div class="hero-cta">
          <a href="register.html" class="btn btn--primary btn--lg" data-i18n="landing.ctaCandidate"></a>
          <a href="about.html" class="btn btn--outline btn--lg" data-i18n="common.learnMore"></a>
        </div>

        <form class="search-bar-card" id="heroSearchForm" role="search">
          <input class="input" type="text" id="heroSearchQuery" data-i18n-placeholder="landing.searchPlaceholder" aria-label="Search">
          <span class="sep"></span>
          <input class="input" type="text" id="heroSearchLocation" data-i18n-placeholder="landing.locationPlaceholder" style="max-width:150px;" aria-label="Location">
          <button type="submit" class="btn btn--ink" data-i18n="landing.searchBtn"></button>
        </form>
        <p class="text-mute" style="font-size:.78rem;margin-top:8px;" data-i18n="landing.searchNote"></p>
      </div>

      <div class="hero-visual anim-scale-in" aria-hidden="true">
        <div class="float-card fc-1">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Profile 92% complete</span>
        </div>
        <div class="float-card fc-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-6Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          <span>Resume uploaded</span>
        </div>
      </div>
    </div>
  </section>

  <section class="trust-strip">
    <div class="container row">
      <span class="label" data-i18n="landing.trustLabel"></span>
      <div class="trust-logos" aria-hidden="true"><span>Nimbus</span><span>Orbital</span><span>Kindred</span><span>Vertex</span><span>Loop&amp;Co</span></div>
    </div>
  </section>

  <section id="jobs">
    <div class="container">
      <div class="section-head-center anim-fade-up">
        <span class="eyebrow" data-i18n="landing.featuresEyebrow"></span>
        <h2 data-i18n="landing.featuresTitle"></h2>
      </div>
      <div class="feature-grid stagger">
        <div class="feature-card">
          <span class="f-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.8"/><path d="M4.5 20c1.6-3.6 4.6-5.5 7.5-5.5s5.9 1.9 7.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
          <h3 data-i18n="landing.feature1Title"></h3>
          <p data-i18n="landing.feature1Desc"></p>
        </div>
        <div class="feature-card">
          <span class="f-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-6Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M14 2v6h5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></span>
          <h3 data-i18n="landing.feature2Title"></h3>
          <p data-i18n="landing.feature2Desc"></p>
        </div>
        <div class="feature-card">
          <span class="f-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2 4 6v6c0 5 3.4 8.7 8 10 4.6-1.3 8-5 8-10V6l-8-4Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg></span>
          <h3 data-i18n="landing.feature3Title"></h3>
          <p data-i18n="landing.feature3Desc"></p>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="stats-band anim-fade-up">
        <h2 style="color:var(--bg);text-align:center;margin-bottom:30px;" data-i18n="landing.statsTitle"></h2>
        <div class="grid-4">
          <div><b data-i18n="landing.stat1"></b><span data-i18n="landing.stat1Label"></span></div>
          <div><b data-i18n="landing.stat2"></b><span data-i18n="landing.stat2Label"></span></div>
          <div><b data-i18n="landing.stat3"></b><span data-i18n="landing.stat3Label"></span></div>
          <div><b data-i18n="landing.stat4"></b><span data-i18n="landing.stat4Label"></span></div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="section-head-center anim-fade-up">
        <span class="eyebrow" data-i18n="landing.stepsEyebrow"></span>
        <h2 data-i18n="landing.stepsTitle"></h2>
      </div>
      <div class="steps-row stagger">
        <div class="step-card"><h3 data-i18n="landing.step1Title"></h3><p data-i18n="landing.step1Desc"></p></div>
        <div class="step-card"><h3 data-i18n="landing.step2Title"></h3><p data-i18n="landing.step2Desc"></p></div>
        <div class="step-card"><h3 data-i18n="landing.step3Title"></h3><p data-i18n="landing.step3Desc"></p></div>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="cta-band anim-scale-in">
        <h2 data-i18n="landing.ctaBandTitle"></h2>
        <p style="color:var(--accent-contrast);opacity:.85;" data-i18n="landing.ctaBandDesc"></p>
        <a href="register.html" class="btn btn--ink btn--lg" data-i18n="landing.ctaBandBtn"></a>
      </div>
    </div>
  </section>

</main>

<div id="app-footer"></div>

<script type="module">
  import { initShell } from './assets/js/app-shell.js';
  import { runLandingPage } from './assets/js/pages/landing.js';
  initShell().then(runLandingPage);
</script>
</body>
</html>
