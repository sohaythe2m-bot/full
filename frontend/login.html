<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLTH</title>
<script>
  (function(){
    try{
      var pref = JSON.parse(localStorage.getItem('flth_theme') || '"system"');
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
</head>
<body data-i18n-doctitle="auth.loginTitle">

<a href="#main" class="skip-link">Skip to content</a>
<div id="app-header"></div>

<main id="main">
  <div class="auth-shell">
    <section class="auth-visual" aria-hidden="true">
      <span class="brand"><span data-i18n="common.brandFrom">FL</span><span class="dot">·</span><span data-i18n="common.brandTo">TH</span></span>
      <div>
        <p class="quote" data-i18n="auth.quote"></p>
        <p class="quote-by" data-i18n="auth.quoteBy"></p>
      </div>
      <div class="visual-stats">
        <div><b data-i18n="auth.statCandidates"></b><span data-i18n="auth.statCandidatesLabel"></span></div>
        <div><b data-i18n="auth.statCompanies"></b><span data-i18n="auth.statCompaniesLabel"></span></div>
      </div>
    </section>

    <section class="auth-form-side">
      <div class="auth-card anim-fade-up">
        <a href="index.html" class="auth-back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span data-i18n="common.backHome"></span>
        </a>
        <h1 data-i18n="auth.loginTitle"></h1>
        <p data-i18n="auth.loginSubtitle"></p>

        <div id="sessionAlert"></div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email" data-i18n="auth.email"></label>
            <input class="input" type="email" id="email" name="email" autocomplete="email" data-i18n-placeholder="auth.emailPlaceholder" required>
            <div class="field-error" id="err_email"></div>
          </div>
          <div class="field">
            <div class="flex justify-between items-center">
              <label for="password" data-i18n="auth.password"></label>
              <a href="forgot-password.html" style="font-size:.82rem;font-weight:700;" data-i18n="auth.forgotLink"></a>
            </div>
            <div class="input-icon-wrap">
              <input class="input" type="password" id="password" name="password" autocomplete="current-password" data-i18n-placeholder="auth.passwordPlaceholder" required>
              <button type="button" class="icon-btn" id="togglePassword" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7"/></svg>
              </button>
            </div>
            <div class="field-error" id="err_password"></div>
          </div>

          <button type="submit" class="btn btn--primary btn--block btn--lg" id="submitBtn">
            <span id="submitLabel" data-i18n="auth.loginSubmit"></span>
          </button>
        </form>

        <p class="top-link"><span data-i18n="auth.noAccount"></span> <a href="register.html" data-i18n="auth.createOne"></a></p>
      </div>
    </section>
  </div>
</main>

<div id="app-footer"></div>

<script type="module">
  import { initShell } from './assets/js/app-shell.js';
  import { runLoginPage } from './assets/js/pages/login.js';
  initShell().then(runLoginPage);
</script>
</body>
</html>
