<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLTH</title>
<script>
  (function(){
    try{
      var pref = JSON.parse(localStorage.getItem('flth_theme') || '"system"');
      var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/layout.css">
</head>
<body data-i18n-doctitle="auth.resetTitle">

<a href="#main" class="skip-link">Skip to content</a>
<div id="app-header"></div>

<main id="main">
  <div class="auth-shell" style="grid-template-columns:1fr;">
    <section class="auth-form-side">
      <div class="auth-card anim-fade-up">
        <h1 data-i18n="auth.resetTitle"></h1>
        <p data-i18n="auth.resetSubtitle"></p>

        <div id="tokenAlert"></div>

        <form id="resetForm" novalidate>
          <div class="field">
            <label for="password" data-i18n="auth.newPassword"></label>
            <input class="input" type="password" id="password" name="password" autocomplete="new-password" required>
            <div class="password-strength" id="strengthBar" data-score="0"><span></span><span></span><span></span><span></span></div>
            <div class="password-strength-label" id="strengthLabel"></div>
            <div class="field-error" id="err_password"></div>
          </div>
          <div class="field">
            <label for="password_confirmation" data-i18n="auth.confirmPassword"></label>
            <input class="input" type="password" id="password_confirmation" name="password_confirmation" autocomplete="new-password" required>
            <div class="field-error" id="err_password_confirmation"></div>
          </div>
          <button type="submit" class="btn btn--primary btn--block btn--lg" id="submitBtn">
            <span id="submitLabel" data-i18n="auth.resetSubmit"></span>
          </button>
        </form>
        <div id="successBox"></div>
      </div>
    </section>
  </div>
</main>

<div id="app-footer"></div>

<script type="module">
  import { initShell } from './assets/js/app-shell.js';
  import { runResetPasswordPage } from './assets/js/pages/reset-password.js';
  initShell().then(runResetPasswordPage);
</script>
</body>
</html>
